<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pneumo D'Or · Rio de Janeiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spin{to{transform:rotate(360deg)}}
:root{
  --bg:#F7F6F2;
  --surface:#FFFFFF;
  --surface2:#F0EFE9;
  --surface3:#E8E6DE;
  --border:#DDD9CE;
  --border2:#C5C0B0;
  --text:#1C1B18;
  --text2:#5C5A52;
  --text3:#9C9A90;
  --gold:#B8973A;
  --gold-light:#F5EDD0;
  --gold-dark:#8A6E24;
  --green:#0D5E48;
  --green-mid:#1A7A5E;
  --green-bg:#E4F2EC;
  --green-text:#0A4535;
  --blue:#1A4F8A;
  --blue-bg:#E8F0FA;
  --blue-text:#123A6A;
  --amber:#8A5200;
  --amber-bg:#FDF0DC;
  --amber-text:#6A3D00;
  --red:#8A1C1C;
  --red-bg:#FAEAEA;
  --red-text:#6A1010;
  --purple:#4A3A9E;
  --purple-bg:#EEEAFE;
  --purple-text:#352A7E;
  --teal:#0A5A4A;
  --teal-bg:#E2F2EE;
  --teal-text:#084535;
  --pink:#8A2550;
  --pink-bg:#FAE8F0;
  --pink-text:#6A1A3C;
  --radius-sm:6px;
  --radius:10px;
  --radius-lg:14px;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.06);
  --shadow:0 2px 8px rgba(0,0,0,0.08),0 1px 3px rgba(0,0,0,0.05);
  --shadow-md:0 8px 24px rgba(0,0,0,0.10),0 2px 6px rgba(0,0,0,0.06);
  --shadow-lg:0 16px 48px rgba(0,0,0,0.14),0 4px 12px rgba(0,0,0,0.08);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* -- HEADER -- */
header{
  background:var(--green);
  padding:0 32px;
  height:60px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
}
.logo{display:flex;align-items:center;gap:14px}
.logo-emblem{
  width:32px;height:32px;border-radius:8px;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.20);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;
}
.logo-text{display:flex;flex-direction:column;gap:0}
.logo-main{font-family:'DM Serif Display',serif;font-size:16px;color:#fff;letter-spacing:0.01em;line-height:1.1}
.logo-sub{font-size:10px;color:rgba(255,255,255,0.55);letter-spacing:0.08em;text-transform:uppercase;font-weight:500}
.header-right{display:flex;align-items:center;gap:12px}
.badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:0.02em;white-space:nowrap}
.badge-medico{background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.95);border:1px solid rgba(255,255,255,0.20)}
.badge-gestor{background:var(--gold-light);color:var(--gold-dark);border:1px solid #D4AE5A}
.badge-enf{background:rgba(255,255,255,0.10);color:rgba(255,255,255,0.90);border:1px solid rgba(255,255,255,0.15)}
.btn-logout{
  font-size:12px;font-weight:500;color:rgba(255,255,255,0.75);cursor:pointer;
  border:1px solid rgba(255,255,255,0.20);background:rgba(255,255,255,0.08);
  padding:6px 12px;border-radius:var(--radius-sm);
  display:flex;align-items:center;gap:6px;transition:all .15s;
  font-family:'Inter',sans-serif;
}
.btn-logout:hover{background:rgba(255,255,255,0.15);color:#fff}

/* -- LAYOUT -- */
.app-body{display:flex;min-height:calc(100vh - 60px)}
.sidebar{
  width:220px;flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  padding:20px 0;
  position:sticky;top:60px;
  height:calc(100vh - 60px);
  overflow-y:auto;
}
.sidebar-section{margin-bottom:24px}
.sidebar-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding:0 18px;margin-bottom:8px}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 18px;font-size:13px;font-weight:500;
  color:var(--text2);cursor:pointer;transition:all .12s;
  border-left:2px solid transparent;
}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--green-bg);color:var(--green);border-left-color:var(--green);font-weight:600}
.nav-item svg{width:15px;height:15px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;font-weight:700}
.nav-badge-g{margin-left:auto;background:var(--green);color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;font-weight:700}
main{flex:1;padding:28px 32px;max-width:900px;min-width:0}

/* -- LOGIN -- */
.login-page{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0D5E48 0%,#1A7A5E 50%,#0D5E48 100%);
  padding:20px;
}
.login-box{
  background:var(--surface);border-radius:var(--radius-lg);
  width:100%;max-width:400px;
  box-shadow:var(--shadow-lg);
  overflow:hidden;
}
.login-top{
  background:var(--green);padding:32px 32px 28px;
  display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;
}
.login-top-emblem{
  width:56px;height:56px;border-radius:14px;
  background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);
  display:flex;align-items:center;justify-content:center;font-size:26px;
}
.login-top h1{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;line-height:1.2}
.login-top p{font-size:12px;color:rgba(255,255,255,0.60);text-transform:uppercase;letter-spacing:0.1em;font-weight:500}
.login-body{padding:28px 32px 32px}
.login-body h2{font-size:15px;font-weight:600;margin-bottom:4px}
.login-body>p{font-size:13px;color:var(--text3);margin-bottom:22px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.field input,.field select{
  width:100%;padding:10px 13px;font-size:14px;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--surface);color:var(--text);
  font-family:'Inter',sans-serif;transition:border-color .15s,box-shadow .15s;outline:none;
  appearance:none;-webkit-appearance:none;
}
.field input:focus,.field select:focus{border-color:var(--green-mid);box-shadow:0 0 0 3px rgba(26,122,94,0.12)}
.field input::placeholder{color:var(--text3)}
.btn-login{
  width:100%;padding:12px;background:var(--green);color:#fff;
  border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;
  cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s;
  letter-spacing:0.01em;margin-top:4px;
}
.btn-login:hover{background:var(--green-mid)}
.login-error{
  background:var(--red-bg);border:1px solid #EAA0A0;
  border-radius:var(--radius-sm);padding:10px 14px;
  font-size:13px;color:var(--red-text);font-weight:500;margin-bottom:16px;display:none;
}
.login-error.show{display:block}

/* -- PAGE TITLES -- */
.page-header{margin-bottom:24px}
.page-header h2{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;color:var(--text);margin-bottom:2px}
.page-header p{font-size:13px;color:var(--text3)}

/* -- FORM -- */
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px}
.form-card-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.form-card-title::after{content:'';flex:1;height:1px;background:var(--border)}
.form-row  {display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.form-row-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:7px}
input[type=text],input[type=number],input[type=date],select{
  width:100%;padding:9px 12px;font-size:13px;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--surface);color:var(--text);
  font-family:'Inter',sans-serif;transition:border-color .15s,box-shadow .15s;outline:none;
  appearance:none;-webkit-appearance:none;
}
input:focus,select:focus{border-color:var(--green-mid);box-shadow:0 0 0 3px rgba(26,122,94,0.12)}
input::placeholder{color:var(--text3)}
.form-group{margin-bottom:0}

/* PILLS */
.pill-group{display:flex;gap:7px;flex-wrap:wrap}
.pill{
  font-size:12px;font-weight:500;padding:6px 13px;
  border:1px solid var(--border);border-radius:20px;
  cursor:pointer;background:var(--surface);color:var(--text2);
  transition:all .12s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;
  font-family:'Inter',sans-serif;
}
.pill:hover{border-color:var(--border2);color:var(--text);background:var(--surface2)}
.pill.sel-blue  {background:var(--blue-bg);  color:var(--blue-text);  border-color:#85B7EB}
.pill.sel-green {background:var(--green-bg); color:var(--green-text); border-color:#5DC8A0}
.pill.sel-warn  {background:var(--amber-bg); color:var(--amber-text); border-color:#D4930A}
.pill.sel-red   {background:var(--red-bg);   color:var(--red-text);   border-color:#E09090}
.pill.sel-purple{background:var(--purple-bg);color:var(--purple-text);border-color:#AFA9EC}
.pill.sel-teal  {background:var(--teal-bg);  color:var(--teal-text);  border-color:#5DC8B0}
.pill.sel-gold  {background:var(--gold-light);color:var(--gold-dark); border-color:#D4AE5A}

.consulta-box{
  border:1px solid #D4930A;border-radius:var(--radius);padding:16px;margin-top:14px;
  background:linear-gradient(135deg,#FFFDF7,#FDF5E0);
}
.consulta-box-title{font-size:12px;font-weight:600;color:var(--amber-text);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sub-box{border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:12px;background:var(--surface2)}
.sub-box-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}

.btn-save{
  width:100%;padding:13px;background:var(--green);color:#fff;
  border:none;border-radius:var(--radius);font-size:14px;font-weight:600;
  cursor:pointer;margin-top:4px;font-family:'Inter',sans-serif;
  transition:background .15s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px;
  letter-spacing:0.01em;
}
.btn-save:hover{background:var(--green-mid)}
.btn-save:active{transform:scale(0.99)}
.btn-save:disabled{background:var(--surface2);color:var(--text3);cursor:not-allowed;border:1px solid var(--border);box-shadow:none}
.success-banner{
  background:var(--green-bg);border:1px solid #5DC8A0;border-radius:var(--radius);
  padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:20px;
}
.success-banner span{font-size:14px;color:var(--green-text);font-weight:600}

/* -- TAGS -- */
.tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:0.02em;white-space:nowrap}
.tag-visita  {background:var(--blue-bg);  color:var(--blue-text)}
.tag-parecer {background:var(--amber-bg); color:var(--amber-text)}
.tag-proc    {background:var(--purple-bg);color:var(--purple-text)}
.tag-alta-p  {background:var(--green-bg); color:var(--green-text)}
.tag-alta-h  {background:#E8F0FA;         color:#1A4F8A}
.tag-consulta{background:var(--amber-bg); color:var(--amber-text)}
.tag-hosp    {background:var(--surface2); color:var(--text2);border:1px solid var(--border)}
.tag-pendente{background:var(--red-bg);   color:var(--red-text)}
.tag-agendado{background:var(--green-bg); color:var(--green-text)}

/* -- LISTA -- */
.list-controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.filter-row{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{
  font-size:12px;font-weight:500;padding:5px 12px;
  border:1px solid var(--border);border-radius:20px;
  cursor:pointer;background:var(--surface);color:var(--text2);
  transition:all .12s;font-family:'Inter',sans-serif;
}
.filter-btn:hover{border-color:var(--border2);color:var(--text)}
.filter-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
.list-meta{font-size:12px;color:var(--text3);margin-bottom:12px}

.record-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;
  transition:box-shadow .15s,border-color .15s;cursor:default;
}
.record-card:hover{box-shadow:var(--shadow);border-color:var(--border2)}
.record-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.record-name{font-size:14px;font-weight:600;line-height:1.3}
.record-name span{font-weight:400;color:var(--text2);font-size:13px}
.record-sub{font-size:12px;color:var(--text3);margin-top:3px}
.record-medico{font-size:11px;color:var(--green-text);font-weight:600;margin-top:3px}
.record-date{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap}
.date-hoje{background:var(--green-bg);color:var(--green-text)}
.date-old{color:var(--text3)}
.record-tags{display:flex;gap:6px;flex-wrap:wrap}
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty p{font-size:14px}

/* -- DASHBOARD -- */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:28px}
.kpi{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 16px;text-align:center;position:relative;overflow:hidden;
}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--green)}
.kpi.amber::before{background:var(--gold)}
.kpi.red::before{background:var(--red)}
.kpi.blue::before{background:var(--blue)}
.kpi.purple::before{background:var(--purple)}
.kpi-num{font-size:30px;font-weight:700;color:var(--text);letter-spacing:-0.03em;line-height:1}
.kpi-label{font-size:11px;color:var(--text3);margin-top:6px;font-weight:500;text-transform:uppercase;letter-spacing:0.04em}
.kpi-delta{font-size:11px;font-weight:600;margin-top:4px}
.delta-up{color:var(--green-text)}

.section-title{
  font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;
  letter-spacing:0.08em;margin-bottom:14px;display:flex;align-items:center;gap:10px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* Hosp cards */
.hosp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:28px}
.hosp-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;transition:box-shadow .15s;
}
.hosp-card:hover{box-shadow:var(--shadow)}
.hosp-card-name{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.hosp-card-name span{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.hosp-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hosp-stat{text-align:center;background:var(--surface2);border-radius:var(--radius-sm);padding:10px 8px}
.hosp-stat-num{font-size:20px;font-weight:700;color:var(--text)}
.hosp-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.04em;margin-top:2px}
.hosp-tags-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}

/* Bar chart */
.bar-chart{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.bar-row{display:flex;align-items:center;gap:12px}
.bar-label{font-size:12px;color:var(--text2);width:160px;flex-shrink:0;text-align:right;font-weight:500;line-height:1.3}
.bar-track{flex:1;background:var(--surface2);border-radius:4px;height:28px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:10px;min-width:28px;transition:width .4s ease;position:relative}
.bar-fill span{font-size:11px;font-weight:700;color:#fff;white-space:nowrap}
.bar-count{font-size:12px;color:var(--text3);width:32px;flex-shrink:0;text-align:right;font-weight:600}

/* Médico list */
.medico-table{width:100%;border-collapse:collapse;margin-bottom:28px}
.medico-table th{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
.medico-table td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.medico-table tr:last-child td{border-bottom:none}
.medico-table tr:hover td{background:var(--surface2)}
.medico-rank{width:24px;height:24px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2)}
.medico-rank.gold{background:var(--gold-light);color:var(--gold-dark)}
.medico-rank.silver{background:#EEE;color:#666}
.medico-rank.bronze{background:#F5E8DC;color:#8B5E3C}

/* -- AGENDA -- */
.agenda-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px;margin-bottom:10px;
  transition:box-shadow .15s;
}
.agenda-card:hover{box-shadow:var(--shadow)}
.agenda-card.pendente{border-left:3px solid var(--red)}
.agenda-card.agendado{border-left:3px solid var(--green)}
.agenda-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.agenda-name{font-size:15px;font-weight:600}
.agenda-sub{font-size:12px;color:var(--text3);margin-top:2px}
.agenda-status{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap}
.status-pendente{background:var(--red-bg);color:var(--red-text)}
.status-agendado{background:var(--green-bg);color:var(--green-text)}
.alta-info{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.agenda-data-row{display:flex;align-items:center;gap:10px}
.agenda-data-row input[type=date]{flex:1}
.btn-confirmar{
  padding:9px 18px;background:var(--green);color:#fff;
  border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;
  cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;transition:background .15s;
}
.btn-confirmar:hover{background:var(--green-mid)}
.agendado-info{
  display:flex;align-items:center;gap:10px;
  background:var(--green-bg);border-radius:var(--radius-sm);padding:12px 16px;
}
.agendado-info span{font-size:14px;color:var(--green-text);font-weight:700}
.btn-reeditar{
  margin-left:auto;font-size:11px;color:var(--text3);background:none;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:4px 10px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .12s;
}
.btn-reeditar:hover{border-color:var(--border2);color:var(--text)}

.btn-export{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 20px;background:var(--gold);color:#fff;
  border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;
  cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s;
}
.btn-export:hover{background:var(--gold-dark)}
.export-bar{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
  background:var(--gold-light);border:1px solid #D4AE5A;
  border-radius:var(--radius);padding:16px 20px;margin-bottom:24px;
}
.export-bar-info{font-size:13px;color:var(--amber-text)}

async function loadRecords(){

function emptyForm(){return{medico:'',nome:'',prontuario:'',idade:'',sexo:'',plano:'',doenca:'',setor:'',setorOutro:'',internacao:'',tipo:'',proc_sub:'',seguimento:'',desfecho:'',consulta:null}}
async function persist(record){
  try {
    await fetch('/api/records',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(record)});
  } catch(e){ console.error('Erro ao salvar:',e); }
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function isToday(ts){return new Date(ts).toDateString()===new Date().toDateString()}
function fmtDate(d){if(!d)return'';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`}
function diffDays(a,b){return Math.round((new Date(b)-new Date(a))/(1000*60*60*24))}

// Internação real: agrupa por prontuário, conta span de dias consecutivos de visita
function calcInternacaoReal(records){
  // group by prontuario
  const byPron={};
  records.forEach(r=>{
    if(!r.prontuario||!r.ts)return;
    if(!byPron[r.prontuario])byPron[r.prontuario]={nome:r.nome,pron:r.prontuario,datas:[]};
    byPron[r.prontuario].datas.push(r.ts.slice(0,10));
  });
  const spans=[];
  Object.values(byPron).forEach(p=>{
    const sorted=[...new Set(p.datas)].sort();
    if(sorted.length<2)return;
    // Find consecutive runs
    let start=sorted[0],prev=sorted[0];
    for(let i=1;i<sorted.length;i++){
      const gap=diffDays(prev,sorted[i]);
      if(gap>3){// gap > 3 dias = nova internação
        spans.push(diffDays(start,prev));
        start=sorted[i];
      }
      prev=sorted[i];
    }
    spans.push(diffDays(start,prev));
  });
  if(!spans.length)return null;
  return(spans.reduce((a,b)=>a+b,0)/spans.length).toFixed(1);
}

function bindLogin(){
  setTimeout(()=>{
    const u=document.getElementById('l-user');
    const p=document.getElementById('l-pass');
    if(u)u.focus();
    if(p)p.addEventListener('keydown',e=>{if(e.key==='Enter')tentarLogin()});
    if(u)u.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('l-pass')?.focus()});
  },50);
}
function tentarLogin(){
  const user=document.getElementById('l-user')?.value.trim().toLowerCase();
  const pass=document.getElementById('l-pass')?.value;
  const found=USUARIOS.find(u=>u.usuario===user&&u.senha===pass);
  if(found){
    S.session={...found};
    S.nav=found.role==='gestor'?'dash':found.role==='enfermeiro'?'fila':'novo';
    S.filter='todos';S.loginError=false;render();
  } else {S.loginError=true;render()}
}

function renderListaMedico(){

  const fLabels={todos:'Todos',visita:'Visitas',parecer:'Pareceres',broncoscopia:'Broncoscopias','troca-canula':'Troca de cânula'};
  if(S.filter!=='todos')recs=recs.filter(r=>r.tipo===S.filter);

  :recs.slice().reverse().map(r=>renderCard(r,false)).join('')}`;

function renderCard(r,showHosp){
  const hoje=isToday(r.ts);
  const tClass={visita:'tag-visita',parecer:'tag-parecer',broncoscopia:'tag-proc','troca-canula':'tag-proc'};
  const tLabel={visita:'Visita',parecer:'Parecer',broncoscopia:r.proc_sub==='centro-cirurgico'?'Bronco CC':'Bronco BL','troca-canula':'Troca de cânula'};
  let tags=`<span class="tag ${tClass[r.tipo]||'tag-proc'}">${tLabel[r.tipo]||r.tipo}</span>`;
  if(r.seguimento==='visita-diaria')tags+=`<span class="tag tag-visita">Seguir visita diária</span>`;
  if(r.seguimento==='sob-demanda')  tags+=`<span class="tag tag-parecer">Sob demanda</span>`;
  if(r.desfecho==='alta-pneumo')tags+=`<span class="tag tag-alta-p">Alta Pneumo</span>`;
  if(r.desfecho==='alta-hosp')  tags+=`<span class="tag tag-alta-h">Alta Hospitalar</span>`;
  if(r.consulta===true)         tags+=`<span class="tag tag-consulta">Consulta solicitada</span>`;
  if(showHosp&&r.hospital)      tags+=`<span class="tag tag-hosp">${r.hospital}</span>`;
  const dias=r.internacao?diffDays(r.internacao,r.ts):null;
  return`<div class="record-card">
    <div class="record-top">
      <div>
        <div class="record-name">${esc(r.nome)} <span>· ${r.idade}a · ${r.sexo}</span></div>
        <div class="record-sub">Pron. ${esc(r.prontuario)}${r.setor?' · <strong>'+esc(r.setor)+'</strong>':''} · ${esc(r.doenca)}${dias!==null?` · ${dias}d internado`:''}</div>
        ${r.medico?`<div class="record-medico">${esc(r.medico)}</div>`:''}
      </div>
      <span class="record-date ${hoje?'date-hoje':'date-old'}">${hoje?'Hoje':new Date(r.ts).toLocaleDateString('pt-BR')}</span>
    </div>
    <div class="record-tags">${tags}</div>
  </div>`;
}

// -- DASHBOARD -----------------------------------------------------------------
function getMesSel(){
  const now=new Date();
  if(S.selectedMes) return S.selectedMes;
  return {mes:now.getMonth(), ano:now.getFullYear()};
}
function renderMonthNav(){
  const {mes,ano}=getMesSel();
  const now=new Date();
  const isNow=mes===now.getMonth()&&ano===now.getFullYear();
  // compute prev/next
  let pm=mes-1,pa=ano; if(pm<0){pm=11;pa--;}
  let nm=mes+1,na=ano; if(nm>11){nm=0;na++;}
  const canNext=!isNow;
  return`<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
    <button onclick="S.selectedMes={mes:${pm},ano:${pa}};render()" style="padding:6px 14px;border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-sm);cursor:pointer;font-family:'Inter',sans-serif;font-size:13px">‹ ${NOMES_MES[pm]}</button>
    <div style="flex:1;text-align:center">
      <span style="font-size:18px;font-weight:700;letter-spacing:-0.02em">${NOMES_MES[mes]} ${ano}</span>
      ${isNow?'<span style="font-size:11px;background:var(--green-bg);color:var(--green-text);border-radius:20px;padding:2px 8px;margin-left:8px;font-weight:600">mês atual</span>':''}
    </div>
    <button onclick="${canNext?`S.selectedMes={mes:${nm},ano:${na}};render()`:''}" style="padding:6px 14px;border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-sm);cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;opacity:${canNext?1:0.3}" ${canNext?'':'disabled'}>${NOMES_MES[nm]} ›</button>
  </div>`;
}

      Exportar planilha ${nomeMes}

  html+=`<div class="kpi-grid">
    <div class="kpi"><div class="kpi-num">${all.length}</div><div class="kpi-label">Total registros</div></div>
    <div class="kpi blue"><div class="kpi-num">${hoje}</div><div class="kpi-label">Hoje</div></div>

// -- PRODUÇÃO POR MÉDICO -------------------------------------------------------
function renderMedicos(){
  const {mes,ano}=getMesSel();
  const nomeMes=NOMES_MES[mes];
  const all=S.records.filter(r=>{const d=new Date(r.ts);return d.getMonth()===mes&&d.getFullYear()===ano;});
  const byMedico={};
  all.forEach(r=>{
    if(!r.medico)return;
    const key=r.medico+'||'+(r.hospital||'');
    if(!byMedico[key])byMedico[key]={nome:r.medico,hospital:r.hospital,total:0,visitas:0,pareceres:0,broncos:0,canulas:0,altas:0};
    byMedico[key].total++;
    if(r.tipo==='visita')byMedico[key].visitas++;
    if(r.tipo==='parecer')byMedico[key].pareceres++;
    if(r.tipo==='broncoscopia')byMedico[key].broncos++;
    if(r.tipo==='troca-canula')byMedico[key].canulas++;
    if(r.desfecho==='alta-pneumo'||r.desfecho==='alta-hosp')byMedico[key].altas++;
  });
  const rows=Object.values(byMedico).sort((a,b)=>b.total-a.total);
  const nav=renderMonthNav();
  if(!rows.length)return nav+`<div class="empty"><div class="empty-icon">👨‍⚕️</div><p>Nenhum registro com médico identificado em ${nomeMes}</p></div>`;
  const rankClass=['gold','silver','bronze'];
  return nav+`<table class="medico-table">
    <thead><tr>
      <th>#</th><th>Médico</th><th>Hospital</th>
      <th>Total</th><th>Visitas</th><th>Pareceres</th><th>Bronco</th><th>Altas</th>
    </tr></thead>
    <tbody>${rows.map((m,i)=>`<tr>
      <td><div class="medico-rank ${rankClass[i]||''}">${i+1}</div></td>
      <td style="font-weight:600">${esc(m.nome)}</td>
      <td><span class="tag tag-hosp">${esc(m.hospital||'')}</span></td>
      <td style="font-weight:700;font-size:15px">${m.total}</td>
      <td>${m.visitas}</td><td>${m.pareceres}</td><td>${m.broncos}</td><td>${m.altas}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

// -- DIAGNÓSTICOS --------------------------------------------------------------
function renderDiagnosticos(){
  const {mes,ano}=getMesSel();
  const nomeMes=NOMES_MES[mes];
  const all=S.records.filter(r=>{const d=new Date(r.ts);return d.getMonth()===mes&&d.getFullYear()===ano;});
  const byDx={};
  all.forEach(r=>{const d=r.doenca||'Outro';byDx[d]=(byDx[d]||0)+1});
  const rows=Object.entries(byDx).sort((a,b)=>b[1]-a[1]);
  const max=rows[0]?rows[0][1]:1;
  const navD=renderMonthNav();
  if(!rows.length)return navD+`<div class="empty"><div class="empty-icon">🔬</div><p>Nenhum diagnóstico registrado em ${nomeMes}</p></div>`;
  let html=navD+`<div class="bar-chart">`;
  rows.forEach(([dx,cnt],i)=>{
    const pct=Math.round((cnt/max)*100);
    html+=`<div class="bar-row">
      <div class="bar-label">${esc(dx)}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%;background:${DX_COLORS[i%DX_COLORS.length]}">
          <span>${cnt}</span>
        </div>
      </div>
      <div class="bar-count">${Math.round(cnt/all.length*100)}%</div>
    </div>`;
  });
  html+=`</div>`;

  // por hospital
  html+=`<div class="section-title">Por hospital</div>`;
  HOSPITAIS.forEach(h=>{
    const rH=all.filter(r=>r.hospital===h);
    if(!rH.length)return;
    const byDxH={};
    rH.forEach(r=>{const d=r.doenca||'Outro';byDxH[d]=(byDxH[d]||0)+1});
    const topDx=Object.entries(byDxH).sort((a,b)=>b[1]-a[1]).slice(0,3);
    html+=`<div style="margin-bottom:16px">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text2)">${h}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${topDx.map(([dx,cnt])=>`<span style="background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600">${esc(dx)} <span style="color:var(--text3)">${cnt}</span></span>`).join('')}
      </div>
    </div>`;
  });
  return html;
}

function renderAgendados(){
  const hosp=S.session.hospital;
  const ag=S.records.filter(r=>r.hospital===hosp&&r.consulta===true&&!!r.data_agendada)
    .sort((a,b)=>(a.data_agendada||'').localeCompare(b.data_agendada||''));

function renderFilaGestor(){
  const pend=S.records.filter(r=>r.consulta===true&&!r.data_agendada);
  if(!pend.length)return`<div class="empty"><div class="empty-icon">✅</div><p>Nenhuma consulta pendente</p></div>`;

  let html=`<p class="list-meta">${pend.length} paciente(s) aguardando na rede</p>`;

function renderAgendaCard(r,agendado,readOnly){

// -- AÇÕES ---------------------------------------------------------------------
function setNav(n){S.nav=n;S.saved=false;S.filter='todos';S.scanning=false;S.scanError=null;if(n!=='novo-gestor'){}render()}
function setGestorHosp(h){S.gestorHosp=h;S.form=emptyForm();S.saved=false;render()}
function setGestorHospIdx(i){setGestorHosp(HOSPITAIS[i])}
function setFilterHospIdx(i){setFilter(HOSPITAIS[i])}
function setFilter(f){S.filter=f;render()}
function setPill(field,val){
  if(field==='tipo'){S.form.desfecho='';S.form.consulta=null;S.form.proc_sub=''}
  if(field==='desfecho'){S.form.consulta=null}
  S.form[field]=val;S.saved=false;render();
}
function salvar(){
  const g=id=>document.getElementById(id)?.value;
  const hosp = S.session.role==='gestor' ? S.gestorHosp : S.session.hospital;
  const rec = {
    id:Date.now(), hospital:hosp,
    medico:g('f-medico')||S.form.medico,
    nome:g('f-nome')||S.form.nome,
    prontuario:g('f-pron')||S.form.prontuario,
    idade:g('f-idade')||S.form.idade,
    sexo:S.form.sexo,
    plano:g('f-plano')||S.form.plano,
    doenca:S.form.doenca,
    setor:(S.form.setor==='Outros'?(S.form.setorOutro||'Outros'):S.form.setor)||'',
    internacao:g('f-internacao')||S.form.internacao,
    seguimento:S.form.seguimento||null,
    tipo:S.form.tipo,
    proc_sub:S.form.proc_sub||null,
    desfecho:S.form.desfecho||null,
    consulta:S.form.consulta,
    data_agendada:null,
    ts:new Date().toISOString()
  };
  S.records.push(rec);
  persist(rec);
  S.form=emptyForm();S.saved=true;render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function canSave(){
  const f=S.form;
  if(!f.medico||!f.nome||!f.prontuario||!f.sexo||!f.plano||!f.doenca||!f.tipo)return false;
  if(f.tipo==='troca-canula')return true;
  if(f.tipo==='parecer')return!!f.seguimento;
  if(f.tipo==='broncoscopia')return!!f.proc_sub;
  if(f.tipo==='visita')return!!f.desfecho&&(f.desfecho==='segue'||f.consulta!==null);
  return false;
}
function confirmarAgenda(id){
  const input=document.getElementById('dt-'+id);
  if(!input?.value){alert('Selecione uma data.');return}
  const rec=S.records.find(r=>r.id===id);
  if(rec){rec.data_agendada=input.value;persist(rec);render()}
}
function reeditarAgenda(id){
  const rec=S.records.find(r=>r.id===id);
  if(rec){rec.data_agendada=null;persist(rec);render()}
}
function bindInputs(){
  [['f-medico','medico'],['f-nome','nome'],['f-pron','prontuario'],['f-idade','idade'],['f-plano','plano'],['f-internacao','internacao'],['f-setor-outro','setorOutro']].forEach(([id,field])=>{
    const el=document.getElementById(id);
    if(el)el.addEventListener(el.tagName==='SELECT'?'change':'input',e=>{
      S.form[field]=e.target.value;
      const b=document.getElementById('btn-salvar');
      if(b)b.disabled=!canSave();
    });
  });
}

// -- PRECIFICAÇÃO -------------------------------------------------------------
// Tabela 2026 — Copa D'Or
// Visita: R$100/unid · Parecer: R$2.500 fixo (≤10) + R$350 variável (>10)
// Bronco BL / Troca cânula: R$750/unid · Bronco CC: R$1.400/unid
function calcParecer(qtd){
  if(!qtd)return 0;
  if(qtd<=10)return 2500;
  return 2500+(qtd-10)*350;
}
function calcValorTotal(vis,par,bbl,bcc,can){
  return(vis*100)+calcParecer(par)+(bbl*750)+(bcc*1400)+(can*750);
}
function valorUnitRec(r){
  if(r.tipo==='visita')return 100;
  if(r.tipo==='parecer')return 250;
  if(r.tipo==='broncoscopia'&&r.proc_sub==='centro-cirurgico')return 1400;
  if(r.tipo==='broncoscopia')return 750;
  if(r.tipo==='troca-canula')return 750;
  return 0;
}

// -- EXPORTAR PLANILHA ---------------------------------------------------------
function exportarPlanilha(){
  if(typeof XLSX==='undefined'){alert('Biblioteca XLSX não carregada. Verifique a conexão com a internet.');return;}
  const {mes,ano}=getMesSel();
  const now=new Date();
  const NOMES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const nomeMes=NOMES[mes];
  const mesRecs=S.records.filter(r=>{const d=new Date(r.ts);return d.getMonth()===mes&&d.getFullYear()===ano;});

  const wb=XLSX.utils.book_new();

  // -- ABA RESUMO --
  const resumo=[
    [`Pneumo D'Or Rio de Janeiro — Produção ${nomeMes} ${ano}`],
    [`Gerado em: ${now.toLocaleDateString('pt-BR')} ${now.toLocaleTimeString('pt-BR')}`],
    [],
    ['Hospital','Visitas','Pareceres','Bronco BL','Bronco CC','Troca Cânula','Total Proc.','Val. Visitas (R$)','Val. Pareceres (R$)','Val. Bronco BL (R$)','Val. Bronco CC (R$)','Val. Cânulas (R$)','TOTAL (R$)','Média Internação (dias)'],
  ];
  let tG={vis:0,par:0,bbl:0,bcc:0,can:0,valor:0};
  HOSPITAIS.forEach(h=>{
    const rH=mesRecs.filter(r=>r.hospital===h);
    const vis=rH.filter(r=>r.tipo==='visita').length;
    const par=rH.filter(r=>r.tipo==='parecer').length;
    const bbl=rH.filter(r=>r.tipo==='broncoscopia'&&r.proc_sub==='beira-leito').length;
    const bcc=rH.filter(r=>r.tipo==='broncoscopia'&&r.proc_sub==='centro-cirurgico').length;
    const can=rH.filter(r=>r.tipo==='troca-canula').length;
    const vVis=vis*100, vPar=calcParecer(par), vBbl=bbl*750, vBcc=bcc*1400, vCan=can*750;
    const tot=vVis+vPar+vBbl+vBcc+vCan;
    const hRecs=mesRecs.filter(r=>r.hospital===h);
    const hIntVal=calcInternacaoReal(hRecs.filter(r=>r.tipo==='visita'));
    resumo.push([h,vis,par,bbl,bcc,can,vis+par+bbl+bcc+can,vVis,vPar,vBbl,vBcc,vCan,tot,hIntVal?Number(hIntVal):'-']);
    tG.vis+=vis;tG.par+=par;tG.bbl+=bbl;tG.bcc+=bcc;tG.can+=can;tG.valor+=tot;
  });
  resumo.push([]);
  const tVis=tG.vis*100,tPar=calcParecer(tG.par),tBbl=tG.bbl*750,tBcc=tG.bcc*1400,tCan=tG.can*750;
  resumo.push(['TOTAL REDE',tG.vis,tG.par,tG.bbl,tG.bcc,tG.can,tG.vis+tG.par+tG.bbl+tG.bcc+tG.can,tVis,tPar,tBbl,tBcc,tCan,tG.valor]);
  resumo.push([]);
  resumo.push(['Tabela de valores aplicada (2026)']);
  resumo.push(['Procedimento','Valor','Observação']);
  resumo.push(['Visita Hospitalar','R$ 100','Por atendimento']);
  resumo.push(['Parecer','R$ 250','Fixo R$2.500 (≤10/mês) + R$350 variável (>10)']);
  resumo.push(['Broncoscopia Beira Leito','R$ 750','Por procedimento']);
  resumo.push(['Broncoscopia Centro Cirúrgico','R$ 1.400','Por procedimento']);
  resumo.push(['Troca de Cânula','R$ 750','Por procedimento']);
  const wsR=XLSX.utils.aoa_to_sheet(resumo);
  wsR['!cols']=[{wch:28},{wch:10},{wch:12},{wch:12},{wch:12},{wch:14},{wch:13},{wch:18},{wch:20},{wch:19},{wch:20},{wch:17},{wch:16}];
  XLSX.utils.book_append_sheet(wb,wsR,'Resumo');

  // -- ABA POR MÉDICO --
  const byM={};
  mesRecs.forEach(r=>{
    if(!r.medico)return;
    const k=r.medico+'||'+(r.hospital||'');
    if(!byM[k])byM[k]={nome:r.medico,hospital:r.hospital||'',vis:0,par:0,bbl:0,bcc:0,can:0};
    if(r.tipo==='visita')byM[k].vis++;
    if(r.tipo==='parecer')byM[k].par++;
    if(r.tipo==='broncoscopia'&&r.proc_sub==='beira-leito')byM[k].bbl++;
    if(r.tipo==='broncoscopia'&&r.proc_sub==='centro-cirurgico')byM[k].bcc++;
    if(r.tipo==='troca-canula')byM[k].can++;
  });
  const medData=[
    [`Produção por Médico — ${nomeMes} ${ano}`],[],
    ['Médico','Hospital','Visitas','Pareceres','Bronco BL','Bronco CC','Troca Cânula','Total Proc.','Valor Total (R$)'],
  ];
  Object.values(byM).sort((a,b)=>{
    return(b.vis*100+calcParecer(b.par)+b.bbl*750+b.bcc*1400+b.can*750)-(a.vis*100+calcParecer(a.par)+a.bbl*750+a.bcc*1400+a.can*750);
  }).forEach(m=>{
    const v=m.vis*100+calcParecer(m.par)+m.bbl*750+m.bcc*1400+m.can*750;
    medData.push([m.nome,m.hospital,m.vis,m.par,m.bbl,m.bcc,m.can,m.vis+m.par+m.bbl+m.bcc+m.can,v]);
  });
  const wsM=XLSX.utils.aoa_to_sheet(medData);
  wsM['!cols']=[{wch:26},{wch:16},{wch:10},{wch:12},{wch:12},{wch:12},{wch:14},{wch:13},{wch:17}];
  XLSX.utils.book_append_sheet(wb,wsM,'Por Médico');

  // -- ABA REGISTROS DETALHADOS --
  const detData=[
    [`Registros Detalhados — ${nomeMes} ${ano}`],[],
    ['Data','Hospital','Médico','Paciente','Prontuário','Setor','Diagnóstico','Procedimento','Seguimento','Desfecho','Valor Unit. (R$)'],
  ];
  const tLabel={visita:'Visita',parecer:'Parecer',broncoscopia:'Broncoscopia','troca-canula':'Troca Cânula'};
  mesRecs.slice().sort((a,b)=>a.ts.localeCompare(b.ts)).forEach(r=>{
    const d=new Date(r.ts);
    const proc=r.tipo==='broncoscopia'?(r.proc_sub==='centro-cirurgico'?'Bronco CC':'Bronco BL'):tLabel[r.tipo]||r.tipo;
    const segLabel=r.seguimento==='visita-diaria'?'Visita diária':r.seguimento==='sob-demanda'?'Sob demanda':'';
    detData.push([d.toLocaleDateString('pt-BR'),r.hospital||'',r.medico||'',r.nome||'',r.prontuario||'',r.setor||'',r.doenca||'',proc,segLabel,r.desfecho||'—',valorUnitRec(r)]);
  });
  const wsD=XLSX.utils.aoa_to_sheet(detData);
  wsD['!cols']=[{wch:12},{wch:14},{wch:24},{wch:34},{wch:12},{wch:18},{wch:30},{wch:14},{wch:16},{wch:16},{wch:16}];
  XLSX.utils.book_append_sheet(wb,wsD,'Registros');

  XLSX.writeFile(wb,`PneumoDor_Producao_${nomeMes}_${ano}.xlsx`);
}

// -- LEITURA DE FOLHA POR IA ---------------------------------------------------
async function lerFolha(event) {
  const file = event.target.files[0];
  if (!file) return;
  S.scanning = true; S.scanError = null; render();
  try {
    const base64 = await new Promise((res,rej) => {
      const r = new FileReader();
      r.onload = e => res(e.target.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
    const mediaType = file.type || 'image/jpeg';
    const prompt = `Analise esta folha de visita/parecer de pneumologia e extraia os dados de CADA paciente listado.
Retorne SOMENTE um array JSON, sem markdown, sem explicações.
Para cada paciente extraia:
- nome: nome completo (string)
- prontuario: número do prontuário, só dígitos (string)
- tipo: "visita" se Visita marcado, "parecer" se Parecer marcado, "broncoscopia" se Broncoscopia marcado
- proc_sub: se broncoscopia = "beira-leito" ou "centro-cirurgico". Caso contrário null.
- seguimento: se parecer = "visita-diaria" (acompanhamento diário) ou "sob-demanda" (pontual). Caso contrário null.
- doenca: diagnósticos marcados com X, unidos por " / " (ex: "DPOC / Pneumonia")
- plano: plano de saúde se visível, senão ""
- setor: setor do paciente se visível (ex: "Clínica Médica", "UTI"), senão ""
- medico: nome do médico no cabeçalho
- data: data da folha YYYY-MM-DD se visível

Exemplo: [{"nome":"João Silva","prontuario":"123456","tipo":"visita","proc_sub":null,"seguimento":null,"doenca":"Pneumonia","plano":"Bradesco","setor":"Clínica Médica","medico":"Felipe Gonzalez","data":"2026-05-28"}]`;

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type':'application/json',
        'x-api-key':'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',
        'anthropic-version':'2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 2000,
        messages: [{role:'user', content:[
          {type:'image', source:{type:'base64', media_type:mediaType, data:base64}},
          {type:'text', text:prompt}
        ]}]
      })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error?.message || 'Erro na API');
    const text = data.content.map(c=>c.text||'').join('').trim().replace(/```json|```/g,'').trim();
    const pacientes = JSON.parse(text);
    if (!Array.isArray(pacientes)||!pacientes.length) throw new Error('Nenhum paciente identificado na imagem');
    S.scanning = false;
    if (pacientes.length === 1) {
      aplicarDadosFolha(pacientes[0]);
    } else {
      S.pacientesFolha = pacientes;
      S.nav = 'selecionar-paciente';
      render();
    }
  } catch(e) {
    S.scanning = false;
    S.scanError = e.message || 'Erro ao processar a imagem';
    render();
  }
}

function aplicarDadosFolha(p) {
  const hosp = S.session.role==='gestor' ? S.gestorHosp : S.session.hospital;
  const medicos = MEDICOS_HOSP[hosp]||[];
  let medicoMatch = '';
  if (p.medico) {
    const pl = p.medico.toLowerCase().replace(/[^\w\s]/g,'');
    medicoMatch = medicos.find(m => {
      const ml = m.toLowerCase();
      const parts = pl.split(' ').filter(x=>x.length>2);
      return parts.some(pt => ml.includes(pt));
    }) || '';
  }
  S.form = {...emptyForm(),
    medico: medicoMatch || S.form.medico,
    nome: p.nome||'', prontuario: p.prontuario||'',
    doenca: p.doenca||'', tipo: p.tipo||'',
    proc_sub: p.proc_sub||'', seguimento: p.seguimento||'',
    setor: p.setor||'', plano: p.plano||'',
  };
  S.scanning=false; S.scanError=null; S.nav='novo';
  render();
  setTimeout(()=>{
    const el=document.getElementById('f-medico');
    if(el&&medicoMatch){el.value=medicoMatch;S.form.medico=medicoMatch;}
    const btn=document.getElementById('btn-salvar');
    if(btn)btn.disabled=!canSave();
  },100);
}

}

function selecionarPacienteFolha(idx){
  const p = S.pacientesFolha[idx];
